<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Daniel Wang | Coming Soon</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #edf2f7;
        --muted: #8d99a6;
        --paper: #080b10;
        --panel: rgba(14, 20, 28, 0.76);
        --line: rgba(148, 163, 184, 0.16);
        --accent: #38d9a9;
        --accent-2: #64b5f6;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        overflow: hidden;
        color: var(--ink);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(148, 163, 184, 0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(148, 163, 184, 0.04) 1px, transparent 1px),
          radial-gradient(circle at 24% 20%, rgba(56, 217, 169, 0.12), transparent 32%),
          radial-gradient(circle at 76% 78%, rgba(100, 181, 246, 0.12), transparent 30%),
          var(--paper);
        background-size: 44px 44px, 44px 44px, auto, auto, auto;
      }

      main {
        width: min(88vw, 680px);
        padding: 64px 28px;
        text-align: center;
        position: relative;
        border: 1px solid var(--line);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.035), transparent),
          var(--panel);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
        backdrop-filter: blur(16px);
      }

      main::before,
      main::after {
        content: "";
        position: absolute;
        width: 12px;
        height: 12px;
        border-color: var(--accent);
        border-style: solid;
        opacity: 0.9;
      }

      main::before {
        top: 18px;
        left: 18px;
        border-width: 1px 0 0 1px;
      }

      main::after {
        right: 18px;
        bottom: 18px;
        border-width: 0 1px 1px 0;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.8rem, 7vw, 6rem);
        font-weight: 750;
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 20px 0 0;
        color: var(--muted);
        font-family:
          "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        font-size: clamp(0.95rem, 2vw, 1.08rem);
        font-weight: 600;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .mark {
        width: 58px;
        height: 32px;
        margin: 0 auto 30px;
        border: 1px solid var(--line);
        border-radius: 8px;
        position: relative;
        background: rgba(8, 11, 16, 0.64);
      }

      .mark::before,
      .mark::after {
        content: "";
        position: absolute;
      }

      .mark::before {
        width: 8px;
        height: 8px;
        left: 12px;
        top: 11px;
        border-right: 2px solid var(--accent);
        border-bottom: 2px solid var(--accent);
        transform: rotate(-45deg);
      }

      .mark::after {
        width: 18px;
        height: 2px;
        right: 12px;
        bottom: 10px;
        background: var(--accent-2);
        box-shadow: 0 0 18px rgba(100, 181, 246, 0.5);
      }
    </style>
  </head>
  <body>
    <main aria-label="Daniel Wang personal website coming soon">
      <div class="mark" aria-hidden="true"></div>
      <h1>Daniel Wang</h1>
      <p>Coming Soon</p>
    </main>
  </body>
</html>
